name: Install Nova social preview

on:
  push:
    paths:
      - ".github/workflows/install-nova-social-preview.yml"
      - ".github/nova-preview-payload/**"

permissions:
  contents: write

jobs:
  install:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Reconstruct verified image
        shell: bash
        run: |
          mkdir -p assets
          cat .github/nova-preview-payload/part-*.b64 | base64 --decode > assets/nova-social-preview.jpg
          echo "90d846ae5db4c57aa8584d01eb4525348e25c429fcafb376a02486411357a362  assets/nova-social-preview.jpg" | sha256sum --check
          test "$(stat -c%s assets/nova-social-preview.jpg)" = "46058"

      - name: Make the social card the README hero
        shell: python
        run: |
          from pathlib import Path
          path = Path("README.md")
          text = path.read_text(encoding="utf-8")
          old = "![Nova Emergent, the canonical Nova artwork by Collaborative Dynamics](assets/nova-emergent.png)"
          new = "![Nova the Optimal AI + MIND — official GitHub social preview](assets/nova-social-preview.jpg)"
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit("README hero line not found; refusing an ungrounded edit.")
          path.write_text(text, encoding="utf-8")

      - name: Remove one-use transport files and commit
        shell: bash
        run: |
          git rm -r .github/nova-preview-payload .github/workflows/install-nova-social-preview.yml
          git add README.md assets/nova-social-preview.jpg
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Add Nova social preview and README hero"
          git push origin HEAD:${{ github.ref_name }}
